<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
    /* Estilos Gerais (Reset e Fonte) */
    body {
        font-family: Verdana, Geneva, Tahoma, sans-serif;
        background-color: #2b0eba; /* Fundo cinza claro */
        margin: 0;
        padding: 20px;
    }

    /* Estrutura Principal (Tag Main Obrigatória) */
    main {
        background-color: rgb(234, 236, 244);
        max-width: 500px; /* Largura máxima para não ficar gigante no PC */
        margin: 0 auto;
        padding: 25px;
        border-radius: 10px;
        border: 2px solid #003399; /* Borda azul do CEEP */
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    h2 {
        color: #003399;
        text-align: center;
        margin-bottom: 20px;
    }

    /* Estilo do Formulário */
    form {
        display: flex;
        flex-direction: column;
    }

    label {
        margin-top: 15px;
        font-weight: bold;
        color: #333;
    }

    /* Campos de Texto e Select */
    input[type="text"], 
    input[type="email"], 
    select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    /* Estilo para Radio e Checkbox (Itens Obrigatórios) */
    .opcoes {
        margin: 10px 0;
        padding: 10px;
        background-color: #f9f9f9;
        border-radius: 5px;
    }

    /* Botões (Reset e Enviar Obrigatórios) */
    .botoes-container {
        display: flex;
        gap: 10px;
        margin-top: 20px;
    }

    input[type="submit"] {
        flex: 2;
        background-color: #003399;
        color: white;
        border: none;
        padding: 12px;
        font-weight: bold;
        cursor: pointer;
        border-radius: 5px;
    }

    input[type="reset"] {
        flex: 1;
        background-color: #cc0000; /* Vermelho para o reset */
        color: white;
        border: none;
        padding: 12px;
        cursor: pointer;
        border-radius: 5px;
    }

    /* Responsividade (Obrigatório) */
    @media (max-width: 480px) {
        main {
            width: 95%;
            padding: 15px;
        }
        
        .botoes-container {
            flex-direction: column; /* Botões um em cima do outro no celular */
    
        }
         body {
        background-color: #0a6cff; /* Um cinza azulado suave */
        margin: 0;
        padding: 0;
    }
    }
</style>
</head>
<body>
 <center>
    <header>
        <h1>Fale Conosco</h1>
        <nav>
            <ul>
                <li><a href="index.html">Início</a></li>
                <li><a href="historia.html">História</a></li>
                <li><a href="cursos.html">Cursos</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
    </header>
 </center>
    <main>
        <section class="form-container">
            <h2>Envie sua dúvida</h2>
            <form action="#" method="POST">
                <!-- Nome -->
                <label for="nome">Nome Completo:</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome aqui" required>
                <br><br>

                <!-- Curso - Atualizado conforme a página de cursos -->
                <label>Qual curso você tem interesse?</label><br>
                <input type="radio" id="info" name="curso" value="informatica">
                <label for="info">Informática</label>
                
                <input type="radio" id="redes" name="curso" value="redes">
                <label for="redes">Redes de Computadores</label>
                <br><br>

                <!-- Interesses -->
                <label>O que você busca no CEEP?</label><br>
                <input type="checkbox" id="estudar" name="interesse" value="estudar">
                <label for="estudar">Apenas Estudar</label>
                
                <input type="checkbox" id="trabalhar" name="interesse" value="estagiando">
                <label for="trabalhar">Estágio/Trabalho</label>
                <br><br>

                <!-- Botões -->
                <button type="submit">Enviar Mensagem</button>
                <button type="reset" style="background-color: #ccc; color: black;">Limpar Campos</button>
            </form>
        </section>
    </main>

    <hr>

    <footer>
        <p>&copy; 2026 - CEEP | Parnamirin/RN</p>
    </footer>

</body>
</html>
